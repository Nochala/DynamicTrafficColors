; =========================================================
; Dynamic Traffic Colors by Nochala
; =========================================================
; Boolean values must use:
; true  = enabled
; false = disabled
;
; Reload cheat code:
; Type the cheat code in-game to reload this INI.
; Default: DTCRELOAD
; =========================================================


[General]
; Master switch for the entire mod. (Default true)
Enabled=true

; Enables random traffic paint colors. (Default true)
EnableColors=true

; Enables random liveries when supported by the vehicle. (Default true)
EnableLiveries=true

; Enables extra visual decal/mod variation when supported. (Default true)
EnableDecals=true

; Makes wheel color follow the chosen vehicle color setup. (Default true)
EnableWheelColors=true

; Ground vehicle scan radius around the player.
; Higher values affect more nearby traffic but can cost more performance. (Default 170.0)
Radius=170.0

; Aircraft scan radius around the player. (Default 260.0)
AircraftRadius=260.0


[Filters]
; Enables dynamic colors for parked traffic vehicles while still respecting all vehicle filters.
ParkedVehicleColors=true

; Prevents emergency vehicles from being recolored. (Default true)
SkipEmergency=true

; Prevents mission-related vehicles from being touched. (Default true)
SkipMissionVehicles=true

; Keeps service/work vehicles closer to vanilla appearance.
; Examples: buses, taxis, tow trucks, utility trucks, etc. (Default true)
ServiceVehiclesKeepColors=true


[Colors]
; Enables more realistic real-world style traffic colors.
; If false, the script uses a more arcade/non-realistic palette. (Default true)
RealisticVehicleColors=true

; Allows more vivid colors to appear occasionally.
; Has more impact when realistic mode is disabled. (Default false)
AllowBrightColors=false

; Enable/disable secondary vehicle color pairing (Default false)
TwoToneColors=false

; Extreme variety mode.
; When enabled, color variety becomes much more aggressive and unrealistic. (Default false)
RainbowMode=false


[Aircraft]
; Allows planes to be processed by the mod. (Default true)
EnablePlanes=true

; Allows helicopters to be processed by the mod. (Default true)
EnableHelicopters=true

; Keeps aircraft liveries unchanged when enabled.
; Set to false if you want random aircraft liveries when available. (Default false)
AircraftKeepLiveries=false


[Liveries]
; Chance for normal vehicles to receive a livery. (Default 10)
LiveryChancePercent=10

; Chance for normal vehicles to receive a decal/mod variation. (Default 14)
DecalChancePercent=14

; Chance for aircraft to receive a livery. (Default 18)
AircraftLiveryChancePercent=18

; Chance for aircraft to receive a decal/mod variation. (Defaul 10)
AircraftDecalChancePercent=10


[Logging]
; Enables log file output.
EnableLog=false

; Name or path of the log file. (Default DynamicTrafficColors.log)
LogFile=DynamicTrafficColors.log


[UI]
; Shows a standard notification when the script loads/reloads.
ShowLoadNotification=true

; Type this cheat code in-game to reload the INI without restarting the game.
; This reloads settings only, not the ASI itself. (Default DTCRELOAD)
ReloadCheatCode=DTCRELOAD